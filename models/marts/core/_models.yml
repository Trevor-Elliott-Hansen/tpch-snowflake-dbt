version: 2

models:

  - name: dim_customer
    description: >
      Customer dimension, denormalized with nation and region for query
      ergonomics in BI tools. One row per customer (current state).
    columns:
      - name: customer_key
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: customer_name
        data_tests: [not_null]
      - name: market_segment
        data_tests:
          - accepted_values:
              arguments:
                values:
                  ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'HOUSEHOLD', 'MACHINERY']
      - name: nation_name
        data_tests: [not_null]
      - name: region_name
        data_tests: [not_null]

  - name: dim_supplier
    description: >
      Supplier dimension, denormalized with nation and region. One row per
      supplier.
    columns:
      - name: supplier_key
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: supplier_name
        data_tests: [not_null]
      - name: nation_name
        data_tests: [not_null]
      - name: region_name
        data_tests: [not_null]

  - name: dim_part
    description: >
      Part dimension. p_type is parsed into category / finish / material in
      stg_tpch__parts.
    columns:
      - name: part_key
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: part_name
        data_tests: [not_null]
      - name: brand
        data_tests: [not_null]

  - name: dim_customer_history
    description: >
      SCD Type 2 history of customer attributes, built from the
      customer_snapshot snapshot. One row per (customer_key, version).
      Filter on `is_current` for the latest version, or use
      `valid_from` / `valid_to_or_max` for point-in-time joins.
    columns:
      - name: customer_history_key
        description: Surrogate key for this version (dbt_scd_id from snapshot).
        data_tests:
          - unique
          - not_null
      - name: customer_key
        description: Natural key. Not unique in this table — unique per version.
        data_tests:
          - not_null
      - name: valid_from
        description: When this version became effective.
        data_tests:
          - not_null
      - name: valid_to
        description: When this version was superseded. NULL for the current version.
      - name: is_current
        description: True for the most recent version of each customer.
        data_tests:
          - not_null
