version: 2

models:

  - name: fct_orders
    description: >
      Fact table at order grain. One row per order. Combines order header
      attributes with pre-aggregated line-item measures from
      int_orders_with_line_items.
    columns:
      - name: order_key
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: customer_key
        description: FK to dim_customer.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']
      - name: order_date
        data_tests: [not_null]
      - name: net_revenue
        description: Sum of net revenue across this order's line items.
      - name: line_item_count
        description: Number of line items in the order.

  - name: fct_order_items
    description: >
      Fact table at line-item grain. One row per (order_key, line_number).
      Surrogate key generated by dbt_utils.generate_surrogate_key.
    columns:
      - name: order_item_key
        description: Surrogate primary key over (order_key, line_number).
        data_tests:
          - unique
          - not_null
      - name: order_key
        description: FK to fct_orders.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_key
      - name: customer_key
        description: FK to dim_customer.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: supplier_key
        description: FK to dim_supplier.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supplier_key
      - name: part_key
        description: FK to dim_part.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_part')
                field: part_key
      - name: return_flag
        data_tests:
          - accepted_values:
              arguments:
                values: ['R', 'A', 'N']
      - name: net_revenue
        description: extended_price * (1 - discount_rate). Computed in staging.
      - name: extended_price
        description: Gross price before discount.
      - name: quantity
        description: Units ordered. Always positive.
